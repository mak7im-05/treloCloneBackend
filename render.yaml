databases:
  - name: trello-db
    plan: free
    databaseName: trello_db
    user: trello_user

services:
  - type: web
    name: trello-backend
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trello-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
